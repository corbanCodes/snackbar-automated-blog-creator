<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Snackbar Blog Creator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --snackbar-teal: #35DCC8;
      --snackbar-dark: #1a1a2e;
    }
    body {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px;
      width: 100%;
      max-width: 400px;
    }
    .logo-container {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-container svg {
      width: 180px;
      height: auto;
    }
    .form-control {
      border-radius: 8px;
      padding: 12px 16px;
      border: 1px solid #dee2e6;
      font-size: 15px;
    }
    .form-control:focus {
      border-color: var(--snackbar-teal);
      box-shadow: 0 0 0 3px rgba(53, 220, 200, 0.15);
    }
    .btn-primary {
      background: var(--snackbar-teal);
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: 500;
      width: 100%;
      font-size: 15px;
    }
    .btn-primary:hover {
      background: #2bc4b2;
    }
    .form-label {
      font-weight: 500;
      color: #495057;
      margin-bottom: 8px;
    }
    .alert {
      border-radius: 8px;
      font-size: 14px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      color: var(--snackbar-dark);
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6c757d;
      text-align: center;
      margin-bottom: 32px;
      font-size: 14px;
    }
  </style>
</head>

    <div class="logo-container">

    </div>
    <h1>Blog Creator</h1>
    <p class="subtitle">Sign in to generate blog content</p>

    <div id="error" class="alert alert-danger d-none"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" required autocomplete="username">
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.classList.add('d-none');

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          errorEl.textContent = data.error || 'Invalid credentials';
          errorEl.classList.remove('d-none');
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
